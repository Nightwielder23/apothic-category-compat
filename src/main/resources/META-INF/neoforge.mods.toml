description='''Adds a loot category data map for items Apotheosis 8.x does not categorize on its own: gun style ranged weapons, Lands of Icaria bidents, and dual purpose pickaxe weapons. With Apothic Compats and Malum present, it also routes modded staffs and scythes to their categories. Keeps the config driven affix blacklist.'''

